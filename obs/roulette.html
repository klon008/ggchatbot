<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Roulette Wheel</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body.allow-overflow {
      overflow: visible;
    }
    body.debug-mode {
      background: radial-gradient(circle at center, #1a1a28 0%, #0d0d14 70%);
    }
    #wheelWrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      overflow: visible;
      transition:
        opacity 0.55s ease,
        visibility 0s linear 0.55s;
    }
    #wheelWrap.is-visible {
      opacity: 1;
      visibility: visible;
      transition:
        opacity 0.55s ease,
        visibility 0s linear 0s;
    }
    #wheelStage {
      position: relative;
      width: min(92vmin, 560px);
      aspect-ratio: 1 / 1;
      overflow: visible;
      transform: scale(0.9);
      opacity: 0.6;
      transition:
        transform 0.55s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.55s ease;
    }
    #wheelWrap.is-visible #wheelStage {
      transform: scale(1);
      opacity: 1;
    }
    #wheelSvg {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      display: block;
      filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.55));
    }
    .pocket-text {
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      fill: #fff;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.35);
      stroke-width: 2px;
    }
    #resultBanner {
      position: absolute;
      left: 50%;
      bottom: 0%;
      opacity: 0;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.78);
      border: 2px solid rgba(255, 217, 102, 0.55);
      color: #fff;
      font: 700 clamp(18px, 3.4vw, 28px) / 1.2 "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      transform: translateX(-50%) translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #resultBanner.is-shown {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      #wheelWrap,
      #wheelStage,
      #resultBanner {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="wheelWrap" aria-hidden="true">
    <div id="wheelStage">
      <svg id="wheelSvg" viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Колесо рулетки">
        <defs>
          <radialGradient id="hubGrad" cx="50%" cy="45%" r="55%">
            <stop offset="0%" stop-color="#f0d78c" />
            <stop offset="55%" stop-color="#c9a227" />
            <stop offset="100%" stop-color="#7a5a12" />
          </radialGradient>
          <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f5e6b8" />
            <stop offset="45%" stop-color="#c8a84b" />
            <stop offset="100%" stop-color="#8a6a1f" />
          </linearGradient>
          <filter id="pointerGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.45" />
          </filter>
        </defs>

        <g id="wheelRotor">
          <circle cx="250" cy="250" r="238" fill="url(#rimGrad)" />
          <g id="pockets"></g>
          <circle cx="250" cy="250" r="78" fill="url(#hubGrad)" stroke="#5c4510" stroke-width="3" />
          <circle cx="250" cy="250" r="58" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
          <text x="250" y="256" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif"
                font-size="22" font-weight="700" fill="#3d2e08">GG</text>
        </g>

        <!-- Маркер (не вращается) -->
        <g filter="url(#pointerGlow)">
          <polygon points="250,18 238,52 262,52" fill="#f4df9a" stroke="#6b4f14" stroke-width="2" />
          <circle cx="250" cy="56" r="7" fill="#fff" stroke="#6b4f14" stroke-width="2" />
        </g>
      </svg>

      <div id="resultBanner" aria-live="polite"></div>
    </div>
  </div>

  <aside id="debugPanel" style="
    display: none;
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    max-height: 38vh;
    overflow: auto;
    padding: 10px 12px;
    background: rgba(10, 10, 18, 0.92);
    border: 1px solid #3d3d5c;
    border-radius: 8px;
    color: #d8d8ec;
    font: 12px/1.45 Consolas, 'Cascadia Mono', monospace;
  ">
    <strong style="color:#9ecbff;font-family:'Segoe UI',system-ui,sans-serif;">Debug — Roulette OBS</strong>
    <div id="debugStatus" style="margin-top:6px;color:#a8a8c0;">—</div>
    <ul id="debugLog" style="margin:8px 0 0;padding:0;list-style:none;"></ul>
  </aside>

  <script src="roulette.js"></script>
</body>
</html>
