<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test · Card Spin</title>
  <link rel="stylesheet" href="/card-templates/card-fx.css" />
  <style>
    :root {
      --spin-ms: 6000ms;
      --card-w: min(72vw, 320px);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body.debug {
      background: #101018;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Shadow on scene — NEVER on rotating .card3d (breaks 3D in CEF) */
    .scene {
      position: relative;
      width: var(--card-w);
      aspect-ratio: 5 / 7;
      perspective: 1400px;
      perspective-origin: center center;
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.75));
    }

    .card3d {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: card-spin var(--spin-ms) linear infinite;
    }

    @keyframes card-spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      overflow: hidden;
      background: #0e1220;
    }
    .face * {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .face-front {
      transform: rotateY(0deg) translateZ(1px);
    }
    .face-back {
      transform: rotateY(180deg) translateZ(1px);
    }
    .face-back img,
    .face-front .front-host,
    .face-front .front-host svg {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #hint {
      display: none;
      position: absolute;
      left: 12px;
      bottom: 12px;
      font: 12px/1.4 Consolas, monospace;
      color: #9aa3b5;
      background: rgba(0, 0, 0, 0.55);
      padding: 6px 10px;
      border-radius: 6px;
    }
    body.debug #hint {
      display: block;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div class="scene">
      <div class="card3d" id="card3d">
        <div class="face face-front">
          <div class="front-host" id="frontHost"></div>
        </div>
        <div class="face face-back">
          <img id="backImg" src="/assets/cards/card-back.svg" alt="" draggable="false" />
        </div>
      </div>
    </div>
  </div>
  <div id="hint">?debug=1 · ?face=elsa · ?rarity=epic · ?back=card-back · ?name=Elsa · ?ms=6000</div>
  <script type="module">
    import { mountCardTemplate } from "/card-templates/fill-card.js";

    const RARITIES = new Set([
      "common",
      "uncommon",
      "rare",
      "epic",
      "legendary",
      "mythic",
      "secretRare",
    ]);

    const params = new URLSearchParams(location.search);
    if (params.has("debug")) document.body.classList.add("debug");

    const face = (params.get("face") || "elsa").trim() || "elsa";
    const back = (params.get("back") || "card-back").trim() || "card-back";
    const name = (params.get("name") || face).trim() || face;
    let rarity = (params.get("rarity") || "epic").trim() || "epic";
    if (!RARITIES.has(rarity)) rarity = "epic";
    const ms = Math.max(800, Number(params.get("ms")) || 6000);

    document.getElementById("backImg").src = `/assets/cards/${back}.svg`;
    document.documentElement.style.setProperty("--spin-ms", `${ms}ms`);

    await mountCardTemplate(document.getElementById("frontHost"), rarity, {
      name,
      portraitUrl: `/assets/cards/${face}.webp`,
    });
  </script>
</body>
</html>
