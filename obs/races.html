<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Races</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body.debug-mode {
      background: radial-gradient(circle at center, #1a1a28 0%, #0d0d14 70%);
    }
    #raceWrap {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      max-width: 100vw;
      height: 140px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease, visibility 0s linear 0.4s;
    }
    #raceWrap.is-visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.4s ease, visibility 0s linear 0s;
    }
    #raceStage {
      width: 100%;
      height: 100%;
      padding: 12px 16px 14px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.35);
      border-top: 2px solid rgba(255, 217, 102, 0.35);
    }
    #track {
      position: relative;
      height: 100%;
      overflow: visible;
    }
    .track-line {
      position: absolute;
      left: 8px;
      right: 40px;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 2px;
    }
    #finishLine {
      position: absolute;
      right: 8px;
      top: 8px;
      bottom: 8px;
      width: 4px;
      background: repeating-linear-gradient(
        0deg,
        #fff 0 8px,
        #111 8px 16px
      );
      z-index: 1;
    }
    #runners {
      position: absolute;
      left: 8px;
      right: 40px;
      top: 0;
      bottom: 0;
      z-index: 2;
    }
    .runner {
      position: absolute;
      bottom: 50%;
      left: 0;
      transform: translateY(0);
      transition: left 0.35s linear, transform 0.35s linear;
    }
    .runner-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      background: #5a5a8a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font: 700 14px "Segoe UI", system-ui, sans-serif;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
    }
    aside#debugPanel {
      display: none;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 152px;
      max-height: 38vh;
      overflow: auto;
      padding: 10px 12px;
      background: rgba(10, 10, 18, 0.92);
      border: 1px solid #3d3d5c;
      border-radius: 8px;
      color: #d8d8ec;
      font: 12px/1.45 Consolas, monospace;
    }
  </style>
</head>
<body>
  <div id="raceWrap" aria-hidden="true">
    <div id="raceStage">
      <div id="track">
        <div class="track-line"></div>
        <div id="finishLine"></div>
        <div id="runners"></div>
      </div>
    </div>
  </div>

  <aside id="debugPanel">
    <strong style="color:#9ecbff;font-family:'Segoe UI',system-ui,sans-serif;">Debug — Races OBS</strong>
    <div id="debugStatus" style="margin-top:6px;color:#a8a8c0;">—</div>
    <ul id="debugLog" style="margin:8px 0 0;padding:0;list-style:none;"></ul>
  </aside>

  <script src="races.js"></script>
</body>
</html>
