<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>OBS Song Request Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #playerWrap {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }
    #playerInner {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scaleY(0.06);
      transform-origin: center center;
      transition:
        opacity 0.42s ease-out,
        transform 0.48s cubic-bezier(0.34, 1.15, 0.64, 1);
      will-change: opacity, transform;
    }
    #playerWrap.is-visible {
      visibility: visible;
      pointer-events: auto;
    }
    #playerWrap.is-visible #playerInner {
      opacity: 1;
      transform: scaleY(1);
    }
    #player {
      width: 100%;
      height: 100%;
    }
    #nowPlaying {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 28px 16px 12px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0.45) 55%, transparent 100%);
      color: #fff;
      font-family: "Segoe UI", system-ui, sans-serif;
      pointer-events: none;
      box-sizing: border-box;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease 0.12s, transform 0.35s ease 0.12s;
    }
    #playerWrap.is-visible #nowPlaying {
      opacity: 1;
      transform: translateY(0);
    }
    .now-playing-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      font-size: clamp(14px, 2.2vw, 20px);
      line-height: 1.35;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }
    .now-playing-user {
      flex-shrink: 0;
      font-weight: 700;
      color: #ffd966;
    }
    .now-playing-sep {
      flex-shrink: 0;
      opacity: 0.55;
    }
    .now-playing-title {
      flex: 1;
      min-width: 0;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (prefers-reduced-motion: reduce) {
      #playerInner,
      #nowPlaying {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="playerWrap">
    <div id="playerInner">
      <div id="player"></div>
      <div id="nowPlaying" aria-hidden="true">
        <div class="now-playing-line">
          <span class="now-playing-user" id="npUser"></span>
          <span class="now-playing-sep">—</span>
          <span class="now-playing-title" id="npTitle"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="player.js"></script>
</body>
</html>
