<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>OBS Song Request Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body.debug-mode {
      background: #14141f;
      overflow: auto;
    }
    #playerWrap {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }
    body.debug-mode #playerWrap {
      height: 55vh;
      min-height: 280px;
    }
    #playerInner {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scaleY(0.06);
      transform-origin: center center;
      transition:
        opacity 0.42s ease-out,
        transform 0.48s cubic-bezier(0.34, 1.15, 0.64, 1);
      will-change: opacity, transform;
    }
    #playerWrap.is-visible {
      visibility: visible;
      pointer-events: auto;
    }
    #playerWrap.is-visible #playerInner {
      opacity: 1;
      transform: scaleY(1);
    }
    #player {
      width: 100%;
      height: 100%;
    }
    #nowPlaying {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 28px 16px 12px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0.45) 55%, transparent 100%);
      color: #fff;
      font-family: "Segoe UI", system-ui, sans-serif;
      pointer-events: none;
      box-sizing: border-box;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease 0.12s, transform 0.35s ease 0.12s;
    }
    #playerWrap.is-visible #nowPlaying {
      opacity: 1;
      transform: translateY(0);
    }
    .now-playing-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      font-size: clamp(14px, 2.2vw, 20px);
      line-height: 1.35;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }
    .now-playing-user {
      flex-shrink: 0;
      font-weight: 700;
      color: #ffd966;
    }
    .now-playing-sep {
      flex-shrink: 0;
      opacity: 0.55;
    }
    .now-playing-title {
      flex: 1;
      min-width: 0;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #debugPanel {
      display: none;
      position: relative;
      box-sizing: border-box;
      margin: 0;
      padding: 12px 14px 16px;
      min-height: 40vh;
      background: #0d0d14;
      border-top: 2px solid #3d3d5c;
      color: #e8e8f0;
      font-family: Consolas, "Cascadia Mono", "Segoe UI", monospace;
      font-size: 13px;
      line-height: 1.45;
    }
    body.debug-mode #debugPanel {
      display: block;
    }
    #debugPanel h2 {
      margin: 0 0 10px;
      font: 600 15px/1.3 "Segoe UI", system-ui, sans-serif;
      color: #9ecbff;
    }
    #debugStatus {
      margin: 0 0 10px;
      padding: 8px 10px;
      background: #1c1c2e;
      border-radius: 6px;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 12px;
      color: #b8b8d0;
    }
    #debugLog {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 32vh;
      overflow-y: auto;
    }
    #debugLog li {
      padding: 4px 0;
      border-bottom: 1px solid #222233;
      word-break: break-word;
    }
    #debugLog li:last-child {
      border-bottom: none;
    }
    #debugLog .log-time {
      color: #666680;
      margin-right: 8px;
    }
    #debugLog .log-info { color: #9ecbff; }
    #debugLog .log-warn { color: #ffd966; }
    #debugLog .log-error { color: #ff7b7b; }
    @media (prefers-reduced-motion: reduce) {
      #playerInner,
      #nowPlaying {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="playerWrap">
    <div id="playerInner">
      <div id="player"></div>
      <div id="nowPlaying" aria-hidden="true">
        <div class="now-playing-line">
          <span class="now-playing-user" id="npUser"></span>
          <span class="now-playing-sep">—</span>
          <span class="now-playing-title" id="npTitle"></span>
        </div>
      </div>
    </div>
  </div>

  <aside id="debugPanel" aria-live="polite">
    <h2>Debug — Song Request Player</h2>
    <p id="debugStatus">Инициализация…</p>
    <ul id="debugLog"></ul>
  </aside>

  <script src="player.js"></script>
</body>
</html>
