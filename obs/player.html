<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>OBS Song Request Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #playerWrap {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }
    #playerInner {
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scaleY(0.06);
      transform-origin: center center;
      transition:
        opacity 0.42s ease-out,
        transform 0.48s cubic-bezier(0.34, 1.15, 0.64, 1);
      will-change: opacity, transform;
    }
    #playerWrap.is-visible {
      visibility: visible;
      pointer-events: auto;
    }
    #playerWrap.is-visible #playerInner {
      opacity: 1;
      transform: scaleY(1);
    }
    #player {
      width: 100%;
      height: 100%;
    }
    #status {
      position: fixed;
      left: 8px;
      bottom: 8px;
      font: 12px/1.4 monospace;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 8px;
      border-radius: 4px;
      max-width: 90vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      #playerInner {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="playerWrap">
    <div id="playerInner">
      <div id="player"></div>
    </div>
  </div>
  <div id="status">Ожидание подключения…</div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="player.js"></script>
</body>
</html>
