<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Booster Open</title>
  <link rel="stylesheet" href="/card-templates/card-fx.css" />
  <style>
    :root {
      --enter-ms: 520ms;
      --enter-opacity-ms: 400ms;
      --exit-ms: 480ms;
      --exit-opacity-ms: 400ms;
      --flip-ms: 1250ms;
      --shatter-ms: 820ms;
      --shatter-opacity-ms: 750ms;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body.debug-mode {
      background: #101018;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    #stage.is-visible {
      visibility: visible;
      opacity: 1;
    }
    #userLabel {
      position: absolute;
      top: 4%;
      left: 0;
      right: 0;
      text-align: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: clamp(12px, 3.5vw, 18px);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      padding: 0 8px;
      box-sizing: border-box;
      z-index: 10;
    }
    #stage.is-visible #userLabel {
      opacity: 1;
      transform: translateY(0);
    }

    /* Shadow on scene — NEVER on rotating .card3d (breaks 3D in CEF) */
    .scene {
      position: relative;
      width: min(88vw, 340px);
      aspect-ratio: 5 / 7;
      perspective: 1400px;
      perspective-origin: center center;
      filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.7));
    }
    .scene.is-new-glow {
      filter:
        drop-shadow(0 16px 32px rgba(0, 0, 0, 0.7))
        drop-shadow(0 0 22px rgba(255, 210, 120, 0.55));
    }

    .card-slot {
      position: relative;
      width: 100%;
      height: 100%;
      transform: translateY(110%);
      opacity: 0;
    }
    .card-slot.is-enter {
      transition:
        transform var(--enter-ms) cubic-bezier(0.22, 1.05, 0.36, 1),
        opacity var(--enter-opacity-ms) ease-out;
      transform: translateY(0);
      opacity: 1;
    }
    .card-slot.is-exit-down {
      transition:
        transform var(--exit-ms) cubic-bezier(0.45, 0.05, 0.75, 0.45),
        opacity var(--exit-opacity-ms) ease-in;
      transform: translateY(120%) rotateZ(6deg);
      opacity: 0;
    }
    .card-slot.is-hidden {
      visibility: hidden;
      opacity: 0;
    }

    .card3d {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform: rotateY(180deg);
      transition: transform var(--flip-ms) cubic-bezier(0.22, 0.85, 0.28, 1);
    }
    .card3d.is-face {
      transform: rotateY(0deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      overflow: hidden;
      background: #0e1220;
    }
    .face * {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .face-front {
      transform: rotateY(0deg) translateZ(1px);
    }
    .face-back {
      transform: rotateY(180deg) translateZ(1px);
    }
    .face-back img,
    .face-front .front-host,
    .face-front .front-host svg {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .fx-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .fx-overlay.is-on {
      opacity: 1;
    }
    .stamp {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(1.35) rotate(-12deg);
      transition: transform 0.35s cubic-bezier(0.2, 1.2, 0.4, 1);
    }
    .fx-overlay.is-on .stamp {
      transform: scale(1) rotate(-8deg);
    }
    .stamp span {
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(28px, 12vw, 52px);
      letter-spacing: 0.06em;
      color: #ff3b5c;
      border: 4px solid #ff3b5c;
      padding: 0.12em 0.28em;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.4);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.5);
    }
    .refund-pop {
      position: absolute;
      top: 14%;
      left: 50%;
      transform: translate(-50%, 12px);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(16px, 5vw, 24px);
      color: #ffe566;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.65s ease;
      z-index: 8;
      pointer-events: none;
      white-space: nowrap;
    }
    .refund-pop.is-on {
      opacity: 1;
      transform: translate(-50%, -28px);
    }

    #shatterLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }
    #shatterLayer:empty {
      display: none;
    }
    .shard {
      position: absolute;
      overflow: hidden;
      will-change: transform, opacity;
      background-repeat: no-repeat;
      transition:
        transform var(--shatter-ms) cubic-bezier(0.22, 0.7, 0.3, 1),
        opacity var(--shatter-opacity-ms) ease-in;
      opacity: 1;
    }
    .shard.is-fly {
      opacity: 0;
    }

    #debugPanel {
      display: none;
      position: absolute;
      left: 8px;
      bottom: 8px;
      right: 8px;
      max-height: 28vh;
      overflow: auto;
      background: rgba(0, 0, 0, 0.75);
      color: #c8d0e0;
      font: 12px/1.4 Consolas, monospace;
      padding: 8px;
      border-radius: 6px;
      z-index: 20;
    }
    body.debug-mode #debugPanel {
      display: block;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="userLabel"></div>
    <div class="scene" id="scene">
      <div class="card-slot" id="cardSlot">
        <div class="card3d" id="card3d">
          <div class="face face-front">
            <div class="front-host" id="frontHost"></div>
          </div>
          <div class="face face-back">
            <img id="cardBackImg" alt="" draggable="false" />
          </div>
        </div>
        <div class="fx-overlay" id="fxOverlay">
          <div class="stamp" id="dupStamp"><span>ДУБЛЬ</span></div>
        </div>
        <div class="refund-pop" id="refundPop"></div>
        <div id="shatterLayer"></div>
      </div>
    </div>
  </div>
  <div id="debugPanel"></div>
  <script type="module" src="/booster.js"></script>
</body>
</html>
